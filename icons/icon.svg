<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="mecra RSS">
  <!-- Siyah zemin + neon lacivert yazılar -->
  <defs>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="114" fill="#000000"/>
  <g fill="#1e3aff" filter="url(#neon)" text-anchor="middle"
     font-family="Arial, Helvetica, sans-serif" font-weight="700">
    <text x="256" y="270" font-size="260">M</text>
    <text x="256" y="410" font-size="120" letter-spacing="6">RSS</text>
  </g>
</svg>
